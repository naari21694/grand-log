name: 💡 Feature / idea
description: Suggest an improvement or a new destination
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like Grand Log to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why / use case
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Baratie (recipes)
        - Log Pose (places / map)
        - Going Merry (home / ideas)
        - Den Den Mushi (bot)
        - Core pipeline
        - New bucket
        - Other
