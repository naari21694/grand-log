name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read   # least-privilege default

jobs:
  compile:
    name: compile (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile pipeline
        run: python -m compileall reel-pipeline/pipeline

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pipx install ruff
      - run: ruff check reel-pipeline/pipeline
