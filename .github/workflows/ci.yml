name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile pipeline
        run: python -m py_compile reel-pipeline/pipeline/*.py
      - name: Lint (non-blocking)
        run: |
          pip install ruff
          ruff check reel-pipeline/pipeline || true
