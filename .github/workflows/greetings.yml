name: Greet new contributors
on: [pull_request_target, issues]
permissions:
  issues: write
  pull-requests: write
jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@3c71ce730280171fd1cfb57c00c774f8998586f7 # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome aboard, and thanks for the first issue. A maintainer will look soon. See CONTRIBUTING.md if you want to dig in."
          pr-message: "Welcome aboard, and thanks for your first pull request. CI and the CLA check run now. See CONTRIBUTING.md and GOVERNANCE.md for how the crew works."
