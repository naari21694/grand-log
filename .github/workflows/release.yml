name: Release

# Cut a release by pushing a version tag (for example v0.3.0). This builds and pushes a
# multi-arch container image to GHCR and creates a GitHub Release with notes and the source
# archives, so every release tracks its bundled downloads. See RELEASING.md.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the image to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: reel-pipeline
          file: reel-pipeline/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ### Downloads
            Container image (multi-arch, amd64 and arm64):

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            Source archives are attached below. Full details in [CHANGELOG.md](CHANGELOG.md).
