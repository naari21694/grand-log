name: Close stale issues and PRs
on:
  schedule:
    - cron: "0 2 * * *"
permissions:
  issues: write
  pull-requests: write
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,good first issue"
          stale-issue-message: "This issue has been quiet for a while. It will close in 14 days without further activity. Comment to keep it open."
          stale-pr-message: "This PR has been quiet for a while. It will close in 14 days without further activity."
