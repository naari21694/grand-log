name: Scorecard supply-chain security
on:
  push:
    branches: ["main"]
  schedule:
    - cron: '30 1 * * 6'   # weekly, Sat 01:30 UTC

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    # Scorecard targets public repos; its checkout fails on a private repo. Run only when public
    # (matches the CodeQL gate), so CI stays clean while private and Scorecard runs once public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # OIDC token; required for publish_results
    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
