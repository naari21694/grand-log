name: Scorecard supply-chain security
on:
  push:
    branches: ["main"]
  schedule:
    - cron: '30 1 * * 6'   # weekly, Sat 01:30 UTC

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    # Scorecard targets public repos; its checkout fails on a private repo. Run only when public
    # (matches the CodeQL gate), so CI stays clean while private and Scorecard runs once public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # OIDC token; required for publish_results
    steps:
      - name: "Checkout code"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: results.sarif
